# Steady scrape — daily MUNI refresh + chained R3 weekly rotation.
#
# Replaces the legacy scrape.yml. Same surface area, but starts with an
# explicit HF prefetch step so the runner has the gitignored state files
# (municipalities.json / official_urls.json / centroids / scrape_state /
# tourism_org_urls / wikidata_attractions) before daily.ts runs.
#
# Design: docs/automation/AUTOMATION_DESIGN.md
# Concurrency: shares group `scrape` with burst-scrape.yml — they cannot
# overlap; the steady cron is skipped while a burst is running.
#
# Launched 2026-06-01: the daily schedule is active. A maintainer can still
# trigger an ad-hoc run via workflow_dispatch (optionally overriding the muni
# count).

name: steady-scrape

on:
  schedule:
    - cron: "0 18 * * *"   # 03:00 JST = 18:00 UTC (previous day)
  workflow_dispatch:
    inputs:
      munis_per_day:
        description: "Override daily muni count (empty = auto)"
        required: false
        default: ""

concurrency:
  group: scrape
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  steady:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Prefetch state from HF (municipalities, urls, centroids, scrape_state)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO || 'open-travel/japan-travel-mcp-data' }}
        run: |
          python3 -m pip install --quiet huggingface_hub
          python3 scrapers/hf/prefetch_state.py --preset steady

      - name: Run daily MUNI scrape
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DAILY_BATCH_SIZE: ${{ github.event.inputs.munis_per_day || '' }}
        run: npx tsx scrapers/daily.ts

      - name: R-3 weekly rotation (chain; errors isolated)
        # R-3 sources (MAFF GI, METI traditional crafts, Japan Heritage,
        # 文化庁 intangible registry, UNESCO ICH) refresh on a day-of-week
        # rotation. A failing R-3 source MUST NOT block the MUNI commit.
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true
        run: npx tsx scrapers/r3_refresh.ts

      - name: Commit operational state (logs + scrape_state)
        # Only lightweight files committed in git get added here. Bulk data
        # (prefectures/*, hotels/master.json, translations/, embeddings/)
        # is gitignored — the next step pushes those to HF.
        run: |
          git config user.name "japan-travel-mcp-bot"
          git config user.email "noreply@github.com"
          git add data/_logs data/_state
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "data: steady scrape state $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Sync bulk data to Hugging Face dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: open-travel/japan-travel-mcp-data
        if: env.HF_TOKEN != ''
        continue-on-error: true
        run: |
          python3 -m pip install --quiet huggingface_hub
          python3 scrapers/hf/upload_dataset.py \
            --commit-message "Steady refresh $(date -u +%Y-%m-%d)" \
            --no-card

      - name: Slack — failure summary
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST -H 'Content-Type: application/json' \
            -d "{\"text\":\"🚨 steady-scrape FAILED on ${GITHUB_REF##*/} ($(date -u +%Y-%m-%dT%H:%M:%SZ))\"}" \
            "$SLACK_WEBHOOK_URL" || true
