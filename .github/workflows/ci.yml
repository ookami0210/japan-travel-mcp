name: CI

# Build, type-check, and test on every push to main and every PR. This is the
# regression net the data-refresh / publish workflows don't provide: nothing
# else runs the vitest suite or the type-checker before code lands or ships.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check (src)
        run: npm run typecheck

      - name: Type-check (scrapers + tests)
        run: npm run typecheck:all

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
