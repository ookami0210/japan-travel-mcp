name: Publish to npm

# Triggered by pushing a tag like v1.0.0 / v1.1.0 / v2.0.0-beta.1.
# The published version comes from package.json — the tag is just the trigger.
# Recommended workflow:
#   1. Bump version: `npm version patch|minor|major` (this updates package.json
#      and creates the matching git tag)
#   2. `git push origin main --follow-tags`
#   3. This workflow runs and publishes.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish --dry-run (no actual publish)"
        required: false
        default: "false"

permissions:
  contents: read
  id-token: write   # required for `npm publish --provenance`

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck && npm run typecheck:all

      - name: Verify package.json version matches the tag
        if: github.event_name == 'push'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Publishing v$PKG_VERSION"

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Sanity-check the tarball contents
        # We never want to ship tests/, scrapers/, or large data/ payloads.
        # If any of those leak in, fail the publish before it touches npm.
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack.log
          if grep -E "^\s*npm notice (data/(translations|prefectures|hotels/master|hotels/raw|glossary)|scrapers/|tests/)" /tmp/pack.log; then
            echo "::error::tarball includes files that should not be published"
            exit 1
          fi
          SIZE_MB=$(grep -E "^\s*npm notice package size" /tmp/pack.log | grep -oE "[0-9.]+ ?[kMG]B" | head -1)
          echo "tarball size: $SIZE_MB"

      - name: Publish to npm
        if: github.event_name == 'push' || github.event.inputs.dry_run != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Dry-run only
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: npm publish --dry-run
