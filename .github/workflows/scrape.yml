name: Daily Scrape

on:
  # The daily cron is disabled while we resolve the missing
  # data/_state/municipalities.json prerequisite that has caused every
  # scheduled run since 2026-05-09 to fail and spam the maintainer with
  # failure notifications. Trigger manually via the Actions tab when
  # state is restored, or re-enable the cron in a follow-up PR.
  # schedule:
  #   - cron: "0 18 * * *"  # 03:00 JST = 18:00 UTC (previous day)
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Municipalities to process this run"
        required: false
        default: "70"

concurrency:
  group: scrape
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run daily scrape
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DAILY_BATCH_SIZE: ${{ github.event.inputs.batch_size || '70' }}
        run: npx tsx scrapers/daily.ts

      - name: R-3 source refresh + incremental translation
        # R-3 sources (MAFF GI, METI traditional crafts, Japan Heritage,
        # 文化庁 intangible registry, UNESCO ICH) refresh on a 7-day rotation
        # so every official designation source is touched within a week.
        # Errors are isolated — a failure here does NOT block the daily commit.
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true
        run: npx tsx scrapers/r3_refresh.ts

      - name: Commit data updates (operational state only)
        # Only the lightweight files we keep in git get committed here:
        #   data/_logs/, data/_state/scrape_state.json, data/_state/translation_batch*.json,
        #   data/_state/r3_translation_batch.json, data/hotels/review/, etc.
        # Bulk runtime data (translations/, prefectures/, hotels/master.json,
        # hotels/raw/, glossary/, _state/wikidata_attractions, _state/muni*, r3/*)
        # is gitignored — the next step pushes those to HF instead.
        run: |
          git config user.name "japan-travel-mcp-bot"
          git config user.email "noreply@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "data: daily scrape state $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Sync bulk data to Hugging Face dataset
        # The HF dataset (open-travel/japan-travel-mcp-data) is the canonical
        # home for bulk runtime data. Push every non-gitignored file under
        # data/ that's been refreshed today. Errors don't block the workflow
        # — the data is still on disk for the next run to pick up.
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: open-travel/japan-travel-mcp-data
        if: env.HF_TOKEN != ''
        continue-on-error: true
        run: |
          python3 -m pip install --quiet huggingface_hub
          python3 scrapers/hf/upload_dataset.py \
            --commit-message "Daily refresh $(date -u +%Y-%m-%d)" \
            --no-card
